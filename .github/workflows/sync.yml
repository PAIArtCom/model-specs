name: sync-upstream

# Weekly pull of LiteLLM's model database. Opens a PR rather than committing to
# main directly — pricing changes are revenue-affecting and deserve a human glance
# at the diff before merge.
on:
  schedule:
    - cron: '17 6 * * 1' # Mondays 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
      - name: Install dependencies
        run: npm ci
      - name: Sync upstream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run sync
      - name: Build
        run: npm run build
      - name: Validate
        run: npm run validate
      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/sync-litellm
          title: 'chore: sync LiteLLM model specs'
          commit-message: 'chore: sync LiteLLM model specs'
          body: |
            Automated weekly sync of `upstream/litellm/` + rebuilt `dist/`.
            Review the pricing/spec diff before merging.
          add-paths: |
            upstream/litellm/prices.json
            upstream/litellm/SOURCE_SHA
            dist/catalog.json
            dist/catalog.sha
